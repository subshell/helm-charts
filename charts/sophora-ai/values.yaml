nameOverride: ""
fullnameOverride: ""

image:
  repository: container.subshell.com/sophora/ai
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.0.0"

imagePullSecrets: []

javaOptions: -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem

sophora:
  authentication:
    secret:
      name: ""
      usernameKey: username
      passwordKey: password

  postgresCredentials:
    username:
    secret:
      name: ""
      loginKey: login
      passwordKey: password

  # LLM provider credentials secrets (optional)
  #llmProviderCredentials:
  #  openai:
  #    secret:
  #      name: ""
  #      apiKeyKey: apiKey

  # Google Search credentials secret (optional)
  #googleSearchCredentials:
  #  secret:
  #    name: ""
  #    searchEngineIDKey: searchEngineID
  #    apiKeyKey: apiKey

  # ARD Recommender credentials secret (optional)
  #ardRecommenderCredentials:
  #  secret:
  #    name: ""
  #    authKeyKey: authKey

  configuration:
    # contents of application.yaml
    application:
      sophora:
        client:
          server-connection:
            urls:
              - https://sophora-server.example.com:1196
            username: # in secret
            password: # in secret

    # contents of application-database.yaml
    database:
      sophora-ai:
        database:
          postgres:
            host: postgres.example.com
            port: 5432
            login: # in secret
            password: # in secret
            database: sophoraai
            schema: public

    # contents of application-alt-text.yaml
    altText:

    # contents of application-caption.yaml
    caption:

    # contents of application-categorize.yaml
    categorize:

    # contents of application-check-claims.yaml
    checkClaims:

    # contents of application-check-issues.yaml
    checkIssues:

    # contents of application-check-script.yaml
    checkScript:

    # contents of application-correct.yaml
    correct:

    # contents of application-crop-hints.yaml
    cropHints:

    # contents of application-elaborate.yaml
    elaborate:

    # contents of application-embedding.yaml
    embedding:

    # contents of application-embedding-ard-recommender.yaml (optional)
    #embeddingARDRecommender:
    #  sophora-ai:
    #    embedding:
    #      ard-recommender:
    #        base-uri: https://ard-recommender.example.com
    #        auth-key: # in secret
    #        client: client

    # contents of application-google.yaml (optional)
    #google:
    #  sophora-ai:
    #    google:
    #      search:
    #        search-engine-id: # in secret
    #        api-key: # in secret

    # contents of application-key-points.yaml
    keyPoints:

    # contents of application-keywords.yaml
    keywords:

    # contents of application-llm.yaml
    llm:

    # contents of application-named-entities.yaml
    namedEntities:

    # contents of application-questions.yaml
    questions:

    # contents of application-quotations.yaml
    quotations:

    # contents of application-reader-copy.yaml
    readerCopy:

    # contents of application-recommend-documents.yaml
    recommendDocuments:

    # contents of application-recommend-links.yaml
    recommendLinks:

    # contents of application-rephrase.yaml
    rephrase:

    # contents of application-sentiment.yaml
    sentiment:

    # contents of application-shorten.yaml
    shorten:

    # contents of application-shorten-teletext.yaml
    shortenTeletext:

    # contents of application-shorten-infoscreen.yaml
    shortenInfoscreen:

    # contents of application-spell-check.yaml (optional)
    spellCheck:

    # contents of application-summarize.yaml
    summarize:

    # contents of application-teaser.yaml
    teaser:

    # contents of application-title.yaml
    title:

    # contents of application-translate.yaml
    translate:

startupProbe:
  failureThreshold: 15
  initialDelaySeconds: 5
  timeoutSeconds: 30
  periodSeconds: 1

readinessProbe:
  failureThreshold: 5
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 5

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 15
  timeoutSeconds: 10
  periodSeconds: 60

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    memory: 1Gi

ai:
  # Extra environment variables.
  #
  # Example extra environment variable to use a GCP credentials file from a secret.
  # Use this in combination with extraVolumes and extraVolumeMounts.
  #
  # - name: GOOGLE_APPLICATION_CREDENTIALS
  #   value: /gcp-credentials/credentials.json
  extraEnv:

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  ingressClassName: nginx
  annotations: {}
  hosts:
  tls: []

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  #   matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

extraDeploy: []

# Extra volumes.
#
# Example extra volume to use a GCP credentials file from a secret:
#
# - name: gcp-credentials
#   secret:
#     secretName: sophora-ai-gcp-credentials
extraVolumes: []

# Extra volume mounts.
#
# Example extra volume mount to use a GCP credentials file from a secret:
#
# - name: gcp-credentials
#   mountPath: /gcp-credentials
#   readOnly: true
extraVolumeMounts: []

podAnnotations: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

languageTool:
  # whether to enable LanguageTool sidecar container (required to use Spell Check feature)
  enabled: false

  image:
    repository: docker.io/erikvl87/languagetool
    pullPolicy: IfNotPresent
    tag: 6.7-dockerupdate-3

  startupProbe:
    failureThreshold: 15
    initialDelaySeconds: 5
    timeoutSeconds: 30
    periodSeconds: 1

  readinessProbe:
    failureThreshold: 5
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 5

  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 15
    timeoutSeconds: 10
    periodSeconds: 60

  resources:
    requests:
      cpu: 200m
      memory: 2Gi
    limits:
      memory: 2Gi

## @section GCP
##
## Specific for the use with GCP Kubernetes Clusters

gcp:
  # gcp.enabled Whether GCP resources should be enabled or not
  enabled: true
  # gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
  # gcp.healthCheck.port Number of the port used for the GCP Health Check
  # gcp.healthCheck.portName Name of the port used for the GCP Health Check
  # gcp.healthCheck.path HTTP path GCP should use to check the application's health
  # gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
  healthCheck:
    enabled: false
    logging: false
    port: 8080
    path: "/actuator/health/readiness"
  # gcp.backendPolicy.enabled Whether the GCP Backend Policy resource should be deployed
  # gcp.backendPolicy.logging Whether to enable access logging for GCP Backend Policy requests
  # gcp.backendPolicy.logging.sampleRate Sample rate for GCP Backend Policy logging (1-1000000)
  # gcp.backendPolicy.sessionAffinity Type of session affinity for GCP Backend Policy (NONE, GENERATED_COOKIE, HTTP_COOKIE)
  # gcp.backendPolicy.cookieTtlSec TTL for session affinity cookies in seconds (only applicable for GENERATED_COOKIE and HTTP_COOKIE)
  # gcp.backendPolicy.timeoutSec Timeout for GCP Backend Policy requests in seconds
  # gcp.backendPolicy.securityPolicy Name of the GCP Cloud Armor Security Policy to apply to the Backend Policy
  # gcp.backendPolicy.iap.enabled Whether to enable Identity-Aware Proxy (IAP) for the GCP Backend Policy
  # gcp.backendPolicy.iap.oauth2ClientSecretName Name of the Kubernetes secret containing the OAuth2 client secret for IAP
  # gcp.backendPolicy.iap.clientID OAuth2 client ID for IAP
  backendPolicy:
    enabled: false
  #  logging:
  #    enabled: false
  #    sampleRate: 1000000
  #  sessionAffinity:
  #    type: NONE
  #    cookieTtlSec: 0
  #  timeoutSec: 30
  #  securityPolicy: ""
  #  iap:
  #    enabled: false
  #    oauth2ClientSecretName: ""
  #    clientID: ""

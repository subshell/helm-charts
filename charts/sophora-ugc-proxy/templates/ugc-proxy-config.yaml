  name: {{ include "sophora-ugc-proxy.fullname" . }}-config
  labels:
    app: {{ include "sophora-ugc-proxy.fullname" . }}
data:
  application.yml: |- {{ toYaml ( required "A configuration is required" .Values.sophora.configuration) | nindent 4 }}
  logback-spring.xml: |- {{ .Values.sophora.logback | nindent 4}}
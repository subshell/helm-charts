apiVersion: v1
kind: Service
metadata:
  name: {{ include "sophora-ugc-proxy.fullname" . }}
  labels:
    {{- include "sophora-ugc-proxy.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    {{- include "sophora-ugc-proxy.selectorLabels" . | nindent 4 }}
  type: {{ .Values.service.type }}
  ports:
    - protocol: TCP
      targetPort: proxy
      port: {{ .Values.service.port }}

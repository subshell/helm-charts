suite: test httproute
templates:
  - httproute.yaml
chart:
  version: 0.9.8
  appVersion: 1.2.3
tests:
  - it: should not create httproute by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create httproute rules for all enabled applications
    release:
      name: values-test-release
    values:
      - ./values/httproute.yaml
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        containsDocument:
          kind: HTTPRoute
          apiVersion: gateway.networking.k8s.io/v1
          name: values-test-release-planr-tools-primary
      - documentIndex: 1
        containsDocument:
          kind: HTTPRoute
          apiVersion: gateway.networking.k8s.io/v1
          name: values-test-release-planr-tools-secondary
      - documentIndex: 0
        equal:
          path: metadata
          value:
            name: values-test-release-planr-tools-primary
            labels:
              helm.sh/chart: planr-tools-0.9.8
              app.kubernetes.io/name: planr-tools
              app.kubernetes.io/version: 1.2.3
              app.kubernetes.io/component: gateway
              app.kubernetes.io/instance: values-test-release
              app.kubernetes.io/managed-by: Helm
            annotations:
              example.com/test: "simple"
              example.com/text: some text value
      - documentIndex: 0
        equal:
          path: spec
          value:
            parentRefs:
              - name: my-gateway
                namespace: gateway-namespace
            hostnames:
              - my-service.example.com
              - other.example.com
            rules:
              - backendRefs:
                  - name: values-test-release-planr-tools-newsroom-document-creator
                    port: 8080
                filters:
                  - type: URLRewrite
                    urlRewrite:
                      path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
                  - type: RequestHeaderModifier
                    requestHeaderModifier:
                      set:
                        - name: X-Custom-Header
                          value: custom-value
                matches:
                  - path:
                      type: PathPrefix
                      value: /document-creator
              - backendRefs:
                  - name: values-test-release-planr-tools-newsroom-feed
                    port: 8081
                filters:
                  - type: URLRewrite
                    urlRewrite:
                      path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
                  - type: RequestHeaderModifier
                    requestHeaderModifier:
                      set:
                        - name: X-Custom-Header
                          value: custom-value
                matches:
                  - path:
                      type: PathPrefix
                      value: /feed
              - backendRefs:
                  - name: values-test-release-planr-tools-newsroom-widget
                    port: 8082
                filters:
                  - type: RequestHeaderModifier
                    requestHeaderModifier:
                      set:
                        - name: X-Custom-Header
                          value: custom-value
                matches:
                  - path:
                      type: PathPrefix
                      value: /
      - documentIndex: 1
        equal:
          path: metadata
          value:
            name: values-test-release-planr-tools-secondary
            labels:
              helm.sh/chart: planr-tools-0.9.8
              app.kubernetes.io/name: planr-tools
              app.kubernetes.io/version: 1.2.3
              app.kubernetes.io/component: gateway
              app.kubernetes.io/instance: values-test-release
              app.kubernetes.io/managed-by: Helm
      - documentIndex: 1
        equal:
          path: spec
          value:
            parentRefs:
              - name: my-gateway
                namespace: gateway-namespace
            hostnames:
              - second.example.com
            rules:
              - backendRefs:
                  - name: values-test-release-planr-tools-newsroom-document-creator
                    port: 8080
                filters:
                  - type: URLRewrite
                    urlRewrite:
                      path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
                matches:
                  - path:
                      type: PathPrefix
                      value: /document-creator
              - backendRefs:
                  - name: values-test-release-planr-tools-newsroom-feed
                    port: 8081
                filters:
                  - type: URLRewrite
                    urlRewrite:
                      path:
                        type: ReplacePrefixMatch
                        replacePrefixMatch: /
                matches:
                  - path:
                      type: PathPrefix
                      value: /feed
              - backendRefs:
                  - name: values-test-release-planr-tools-newsroom-widget
                    port: 8082
                filters: null
                matches:
                  - path:
                      type: PathPrefix
                      value: /
      - notFailedTemplate: {}

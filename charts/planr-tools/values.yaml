replicaCount: 1

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

javaOptions: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=80.0 -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem"

podAnnotations: {}
podSecurityContext: {}
containerSecurityContext: {}

nodeSelector: {}
affinity: {}
tolerations: []

resources:
  limits: {}
  requests: {}

startupProbe:
  failureThreshold: 30
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 5

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 15
  timeoutSeconds: 10
  periodSeconds: 60

readinessProbe:
  failureThreshold: 5
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 5

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

commonEnv: []
commonEnvFrom: []

ingress:
  enabled: false
  ingressClassName: nginx
  tls:
  hosts:
  annotations: {}

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

applications:
  documentCreator:
    enabled: true
    name: newsroom-document-creator
    hostname: ""
    image:
      repository: container.subshell.com/customers/newsroom-document-creator
      pullPolicy: IfNotPresent
      tag: ""
    service:
      annotations: {}
      type: ClusterIP
      port: 8080
      targetPort: 8080
      loadBalancerIP:
    exposure:
      path: /document-creator
    env: []
    envFrom: []
    resources: {}
    config:
      spring:
        application:
          name: Newsroom-Document-Creator
      server:
        port: 8080
      logging:
        path: logs
      management:
        endpoints:
          web:
            base-path: /actuator
            exposure:
              include: health,info
      sophora:
        client:
          server-connection:
            urls: # e.g. https://cms.example.com/
            username: # in secret
            password: # in secret

  feed:
    enabled: true
    name: newsroom-feed
    hostname: ""
    image:
      repository: container.subshell.com/customers/newsroom-feed
      pullPolicy: IfNotPresent
      tag: ""
    service:
      annotations: {}
      type: ClusterIP
      port: 8081
      targetPort: 8081
      loadBalancerIP:
    exposure:
      path: /feed
    env: []
    envFrom: []
    resources: {}
    config:
      spring:
        application:
          name: Newsroom-Feed
        resources:
          add-mappings: true
      server:
        port: 8081
      logging:
        path: logs
      management:
        endpoints:
          web:
            base-path: /actuator
            exposure:
              include: health,info
      sophora:
        client:
          server-connection:
            urls: # e.g. https://cms.example.com/
            username: # in secret
            password: # in secret

  widget:
    enabled: true
    name: newsroom-widget
    hostname: ""
    image:
      repository: container.subshell.com/customers/newsroom-widget
      pullPolicy: IfNotPresent
      tag: ""
    service:
      annotations: {}
      type: ClusterIP
      port: 8082
      targetPort: 8082
      loadBalancerIP:
    exposure:
      path: /
    env: []
    envFrom: []
    resources: {}
    config:
      spring:
        application:
          name: Newsroom-Widget
        jackson:
          serialization:
            write_dates_as_timestamps: false
      logging:
        path: logs
      server:
        port: 8082
        compression:
          enabled: true
      management:
        endpoints:
          web:
            base-path: /actuator
            exposure:
              include: health,info
      sophora:
        client:
          server-connection:
            urls: # e.g. https://cms.example.com/
            username: # in secret
            password: # in secret

## @section GCP
##
## Specific for the use with GCP Kubernetes Clusters

gcp:
  # gcp.enabled Whether GCP resources should be enabled or not
  enabled: true
  # gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
  # gcp.healthCheck.port Number of the port used for the GCP Health Check
  # gcp.healthCheck.portName Name of the port used for the GCP Health Check
  # gcp.healthCheck.path HTTP path GCP should use to check the application's health
  # gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
  healthCheck:
    enabled: false
    logging: false
    port: 8080
    # note: Cannot use named port when using network endpoint group as backend.
    # portName: http
    path: "/actuator/health/readiness"
  # gcp.backendPolicy.enabled Whether the GCP Backend Policy resource should be deployed
  # gcp.backendPolicy.logging.enabled Whether to enable access logging for GCP Backend Policy requests
  # gcp.backendPolicy.logging.sampleRate Sample rate for GCP Backend Policy logging (1-1000000)
  # gcp.backendPolicy.sessionAffinity Type of session affinity for GCP Backend Policy (NONE, GENERATED_COOKIE, HTTP_COOKIE)
  # gcp.backendPolicy.cookieTtlSec TTL for session affinity cookies in seconds (only applicable for GENERATED_COOKIE and HTTP_COOKIE)
  # gcp.backendPolicy.timeoutSec Timeout for GCP Backend Policy requests in seconds
  # gcp.backendPolicy.securityPolicy Name of the GCP Cloud Armor Security Policy to apply to the Backend Policy
  # gcp.backendPolicy.iap.enabled Whether to enable Identity-Aware Proxy (IAP) for the GCP Backend Policy
  # gcp.backendPolicy.iap.oauth2ClientSecretName Name of the Kubernetes secret containing the OAuth2 client secret for IAP
  # gcp.backendPolicy.iap.clientID OAuth2 client ID for IAP
  backendPolicy:
    enabled: false
  #  logging:
  #    enabled: false
  #    sampleRate: 1000000
  #  sessionAffinity:
  #    type: NONE
  #    cookieTtlSec: 0
  #  timeoutSec: 30
  #  securityPolicy: ""
  #  iap:
  #    enabled: false
  #    oauth2ClientSecretName: ""
  #    clientID: ""

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

javaOptions: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=80.0 -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem"

podAnnotations: {}
podSecurityContext: {}
containerSecurityContext: {}

nodeSelector: {}
affinity: {}
tolerations: []

resources:
  limits: {}
  requests: {}

startupProbe:
  failureThreshold: 30
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 5

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 15
  timeoutSeconds: 10
  periodSeconds: 60

readinessProbe:
  failureThreshold: 5
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 5

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

commonEnv: []
commonEnvFrom: []

ingress:
  enabled: false
  ingressClassName: nginx
  tls:
  hosts:
  annotations: {}

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []
  filters: []
  annotations: {}

applications:
  documentCreator:
    enabled: true
    name: newsroom-document-creator
    hostname: ""
    image:
      repository: docker.subshell.com/planr-tools/newsroom-document-creator
      pullPolicy: IfNotPresent
      tag: ""
    service:
      annotations: {}
      type: ClusterIP
      port: 8080
      targetPort: 8080
      loadBalancerIP:
    exposure:
      path: /document-creator
    env: []
    envFrom: []
    resources: {}
    config:
      spring:
        application:
          name: Newsroom-Document-Creator
      server:
        port: 8080
      logging:
        path: logs
      management:
        endpoints:
          web:
            base-path: /actuator
            exposure:
              include: health, info, jolokia, endpoints
      sophora:
        client:
          server-connection:
            urls: # e.g. https://cms.example.com/
            username: # in secret
            password: # in secret

  feed:
    enabled: true
    name: newsroom-feed
    hostname: ""
    image:
      repository: docker.subshell.com/planr-tools/newsroom-feed
      pullPolicy: IfNotPresent
      tag: ""
    service:
      annotations: {}
      type: ClusterIP
      port: 8081
      targetPort: 8081
      loadBalancerIP:
    exposure:
      path: /feed
    env: []
    envFrom: []
    resources: {}
    config:
      spring:
        application:
          name: Newsroom-Feed
        resources:
          add-mappings: true
      server:
        port: 8081
      logging:
        path: logs
      management:
        endpoints:
          web:
            base-path: /actuator
            exposure:
              include: health, info, jolokia, endpoints
      sophora:
        client:
          server-connection:
            urls: # e.g. https://cms.example.com/
            username: # in secret
            password: # in secret

  widget:
    enabled: true
    name: newsroom-widget
    hostname: ""
    image:
      repository: docker.subshell.com/planr-tools/newsroom-widget
      pullPolicy: IfNotPresent
      tag: ""
    service:
      annotations: {}
      type: ClusterIP
      port: 8082
      targetPort: 8082
      loadBalancerIP:
    exposure:
      path: /
    env: []
    envFrom: []
    resources: {}
    config:
      spring:
        application:
          name: Newsroom-Widget
        jackson:
          serialization:
            write_dates_as_timestamps: false
      logging:
        path: logs
      server:
        port: 8082
        compression:
          enabled: true
      sophora:
        client:
          server-connection:
            urls: # e.g. https://cms.example.com/
            username: # in secret
            password: # in secret

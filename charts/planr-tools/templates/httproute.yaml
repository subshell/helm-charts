{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "planr-tools.fullname" . }}
  labels:
    {{- include "planr-tools.labels" (dict "root" . "component" (dict "name" "gateway")) | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- range . }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $appKey := (include "planr-tools.app-keys" $ | fromYaml).keys }}
    {{- $component := index $.Values.applications $appKey }}
    {{- if $component.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ $component.exposure.path | quote }}
      backendRefs:
        - name: {{ include "planr-tools.componentFullname" (dict "root" $ "component" $component) }}
          port: {{ $component.service.port }}
      filters:
        {{- if ne $component.exposure.path "/" }}
        {{/* Strip the path prefix so apps receive requests at their own root, same as the Ingress rewrite. */}}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
        {{- with $.Values.httpRoute.filters }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}

{{- $fullName := include "planr-tools.fullname" . }}
{{- $labels := include "planr-tools.labels" (dict "root" . "component" (dict "name" "gateway")) -}}
{{- range $key := (.Values.httpRoutes | keys | sortAlpha) }}
{{- $httpRoute := index $.Values.httpRoutes $key }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "common.suffixName.name" (dict "fullName" $fullName "suffix" $key) }}
  labels:
    {{- $labels | nindent 4 }}
  {{- with $httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $httpRoute.parentRefs }}
  parentRefs:
  {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if $httpRoute.hostnames }}
  hostnames:
  {{- range $httpRoute.hostnames }}
    - {{ . | quote }}
  {{- end }}
  {{- end }}
  rules:
    {{- range $appKey := (include "planr-tools.app-keys" $ | fromYaml).keys }}
    {{- $component := index $.Values.applications $appKey }}
    {{- if $component.enabled }}
    - backendRefs:
        - name: {{ include "planr-tools.componentFullname" (dict "root" $ "component" $component) }}
          port: {{ $component.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: {{ $component.exposure.path | quote }}
      {{- if or (ne $component.exposure.path "/") $httpRoute.filters }}
      filters:
        {{- if ne $component.exposure.path "/" }}
        {{/* Strip the path prefix so apps receive requests at their own root, same as the Ingress rewrite. */}}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
        {{- with $httpRoute.filters }}
      {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
  {{- end }}
  {{- end }}
---
{{- end }}
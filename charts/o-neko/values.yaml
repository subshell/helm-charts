## @section Common parameters
##

# nameOverride String to partially override the name
nameOverride: ""

# fullnameOverride String to fully override the release name
fullnameOverride: ""

# imagePullSecrets Docker registry secret names as an array
imagePullSecrets: []

# javaOptions String with Java VM Options passed to the application
javaOptions: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=80.0 -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem"

# hostAliases Host aliases available to the application
hostAliases:

# resources.limits The resource limits for the container
# resources.requests The resource requests for the container
resources:
  limits: {}
  requests: {}

## @section O-Neko parameters
## Parameters which configure the O-Neko installation
##

oneko:

  # oneko.image.name O-Neko image repository
  # oneko.image.tag O-Neko image tag
  # oneko.image.imagePullPolicy Image Pull Policy
  image:
    name: subshellgmbh/o-neko
    tag: 1.8.2
    imagePullPolicy: IfNotPresent

  ## @extra oneko.env array of environment variables passed to the container
  # oneko.env[0].name default environment variable name for activation json logging
  # oneko.env[0].value name of the Spring profile used to activate json logging
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: "json-logs"

  ## Helm parameter configuration
  # oneko.helm.gcs.secret.name The secret name of the Google Service Account used, if using Helm GCS
  # oneko.helm.gcs.secret.serviceAccountField The field in the secret of the Google Service Account
  helm:
    gcs:
      secret:
        name:
        serviceAccountField:

  ## MongoDB connection parameters
  # oneko.mongodb.secret.name Name of the secret holding the MongoDB connection URI
  # oneko.mongodb.secret.uriField Name of the field in the secret containing the MongoDB URI
  mongodb:
    secret:
      name: #required
      uriField: uri

  ## Secret containing the key for symmetrical encryption of sensitive data in the database
  # oneko.credentialsCoderKeySecret.name Name of the secret
  # oneko.credentialsCoderKeySecret.fieldName Name of the field in the secret
  credentialsCoderKeySecret:
    name: #required
    fieldName: key

  ## @extra oneko.config The application.yaml containing the O-Neko application configuration
  ## @skip oneko.config
  config:
    management:
      endpoints:
        web:
          exposure:
            include: health, info, prometheus, threaddump
    spring:
      data:
        mongodb:
          autoIndexCreation: true

## @section Probes
##

# startupProbe.failureThreshold Failure threshold for startupProbe
# startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
# startupProbe.timeoutSeconds Timeout seconds for startupProbe
# startupProbe.periodSeconds Period seconds for startupProbe
startupProbe:
  failureThreshold: 10
  initialDelaySeconds: 10
  timeoutSeconds: 1
  periodSeconds: 2

# readinessProbe.failureThreshold Failure threshold for readinessProbe
# readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
# readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
# readinessProbe.periodSeconds Period seconds for readinessProbe
readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 5

# livenessProbe.failureThreshold Failure threshold for livenessProbe
# livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
# livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
# livenessProbe.periodSeconds Period seconds for livenessProbe
livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 15
  timeoutSeconds: 10
  periodSeconds: 60

## @section Traffic Exposure parameters
##

service:
  # service.annotations annotations for the service
  annotations: {}
  # service.type Kubernetes service type
  type:
  # service.sessionAffinity the service's sessionAffinity
  sessionAffinity: None
  # service.sessionAffinityConfig additional sessionAffinity configuration
  sessionAffinityConfig: {}
  # service.loadBalancerIP A loadBalancerIP configuration
  loadBalancerIP:
  # service.clusterIP The service's clusterIP
  clusterIP:

ingress:
  # ingress.enabled Whether an ingress resource should be created
  enabled: false
  # ingress.ingressClassName name of the ingressClass used for the ingress
  ingressClassName:
  # ingress.hosts Array with hostnames used for the ingress
  ## e.g.
  ## hosts:
  ##   - host: "oneko.my-company.com"
  hosts:
  # ingress.tls TLS configuration of the ingress as an array
  ## e.g.
  ## tls:
  ##   - hosts:
  ##     - "oneko.my-company.com"
  ##     secretName: oneko-tls
  tls:
  # ingress.annotations annotations for the ingress
  annotations: {}

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  #   matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

## @section Metrics
##
## Specific for the use with the kube-prometheus-stack

# serviceMonitor.enabled Whether the serviceMonitor resource should be deployed
# serviceMonitor.interval Prometheus scrape interval
# serviceMonitor.path HTTP path prometheus should use to scrape the application's metrics
serviceMonitor:
  enabled: false
  interval: 10s
  path: "/actuator/prometheus"

## @section GCP
##
## Specific for the use with GCP Kubernetes Clusters

gcp:
  # gcp.enabled Whether GCP resources should be enabled or not
  enabled: true
  # gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
  # gcp.healthCheck.port Number of the port used for the GCP Health Check
  # gcp.healthCheck.portName Name of the port used for the GCP Health Check
  # gcp.healthCheck.path HTTP path GCP should use to check the application's health
  # gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
  healthCheck:
    enabled: false
    logging: false
    port: 8080
    # note: Cannot use named port when using network endpoint group as backend.
    # portName: http
    path: "/actuator/health"
  # gcp.backendPolicy.enabled Whether the GCP Backend Policy resource should be deployed
  # gcp.backendPolicy.logging.enabled Whether to enable access logging for GCP Backend Policy requests
  # gcp.backendPolicy.logging.sampleRate Sample rate for GCP Backend Policy logging (1-1000000)
  # gcp.backendPolicy.sessionAffinity Type of session affinity for GCP Backend Policy (NONE, GENERATED_COOKIE, HTTP_COOKIE)
  # gcp.backendPolicy.cookieTtlSec TTL for session affinity cookies in seconds (only applicable for GENERATED_COOKIE and HTTP_COOKIE)
  # gcp.backendPolicy.connectionDraining.drainingTimeoutSec Timeout for GCP Backend Policy connection draining in seconds
  # gcp.backendPolicy.timeoutSec Timeout for GCP Backend Policy requests in seconds
  # gcp.backendPolicy.securityPolicy Name of the GCP Cloud Armor Security Policy to apply to the Backend Policy
  # gcp.backendPolicy.iap.enabled Whether to enable Identity-Aware Proxy (IAP) for the GCP Backend Policy
  # gcp.backendPolicy.iap.oauth2ClientSecretName Name of the Kubernetes secret containing the OAuth2 client secret for IAP
  # gcp.backendPolicy.iap.clientID OAuth2 client ID for IAP
  backendPolicy:
    enabled: false
  #  logging:
  #    enabled: false
  #    sampleRate: 1000000
  #  sessionAffinity:
  #    type: NONE
  #    cookieTtlSec: 0
  #  connectionDraining:
  #    drainingTimeoutSec: 0
  #  timeoutSec: 30
  #  securityPolicy: ""
  #  iap:
  #    enabled: false
  #    oauth2ClientSecretName: ""
  #    clientID: ""

# extraDeploy is a list of full Kubernetes manifests that will be rendered additionally by this chart
extraDeploy: []

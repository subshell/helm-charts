## @section Common parameters
##

# nameOverride String to partially override the name
nameOverride: ""

# fullnameOverride String to fully override the release name
fullnameOverride: ""

## @section Cluster Server Loadbalancer
## Parameters which configure service and ingress that point to the primary cluster server
##
clusterServerLb:

  # clusterServerLb.enabled whether the service and ingress should be deployed or not
  enabled: false
  # clusterServerLb.name names of the resources
  name: cluster-server-lb

  ingress:
    # clusterServerLb.ingress.enabled whether the ingress should be enabled
    enabled: true
    # clusterServerLb.ingress.ingressClassName name of the ingressClass used for the ingress
    ingressClassName: ""
    # clusterServerLb.ingress.annotations annotations for the ingress
    annotations: {}
    # clusterServerLb.ingress.hosts array with hostnames used for the ingress
    # e.g.
    # hosts:
    #   - host: "cms.mysophora.com"
    hosts: []
    #  - host: ""
    #    path: /

  # This can be used to configure a different ingress for the SRPC service as it might require different settings.
  # The SRPC-communication relies on gRPC as communication protocol and e.g. nginx needs to be explicitly informed that the backend protocol is gRPC
  # The paths can be regex-matched since all SRPC-calls have the root-path sophora.srpc
  grpcIngress:
    enabled: false
    # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
    # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
    # ingressClassName: nginx
    annotations: {}
    # kubernetes.io/tls-acme: "true"
    # nginx.ingress.kubernetes.io/use-regex: "true"
    # nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    hosts:
    # - host: chart-example.local
    #   path: /sophora\.srpc.*
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  # httpRoutes Map of HTTPRoute resources (Gateway API) to create.
  # The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
  httpRoutes: {}
    # web:
    #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
    #   parentRefs:
    #     - name: my-gateway
    #       namespace: gateway-namespace
    #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
    #   hostnames:
    #     - "my-service.example.com"
    #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
    #   matches:
    #     - path:
    #         type: PathPrefix
    #         value: /
    #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
    #   filters:
    #     - type: RequestHeaderModifier
    #       requestHeaderModifier:
    #         set:
    #           - name: X-Custom-Header
    #             value: custom-value
    #   # httpRoutes.web.annotations annotations for the HTTPRoute
    #   annotations: {}

  # This can be used to configure different HTTPRoute for the SRPC service as it might require different settings. Can be used with the same hostname as `httpRoutes`, see https://gateway-api.sigs.k8s.io/api-types/grpcroute/#cross-serving.
  # The SRPC-communication relies on gRPC as communication protocol and e.g. nginx needs to be explicitly informed that the backend protocol is gRPC
  # The paths can be regex-matched since all SRPC-calls have the root-path sophora.srpc
  grpcHttproutes: {}
    # grpc:
    #   # grpcHttproutes.grpc.parentRefs References to the Gateway resources that the HTTPRoute should attach to
    #   parentRefs:
    #     - name: my-gateway
    #       namespace: gateway-namespace
    #   # grpcHttproutes.grpc.hostnames Array with hostnames used for the HTTPRoute
    #   hostnames:
    #     - "my-service.example.com"
    #   # grpcHttproutes.grpc.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
    #   matches:
    #     - path:
    #         type: PathPrefix
    #         value: /sophora.srpc
    #   # grpcHttproutes.grpc.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
    #   filters:
    #     - type: RequestHeaderModifier
    #       requestHeaderModifier:
    #         set:
    #           - name: X-Custom-Header
    #             value: custom-value
    #   # grpcHttproutes.grpc.annotations annotations for the HTTPRoute
    #   annotations: {}

  # This can be used to configure multiple GRPCRoute for the SRPC service. This must use another hostname than `httpRoutes`. For the same hostname use `grpcHttproutes`.
  # The SRPC-communication relies on gRPC as communication protocol and e.g. nginx needs to be explicitly informed that the backend protocol is gRPC
  # The service can be matched since all SRPC-calls have the sophora.srpc package
  grpcRoutes: {}
    # grpc:
    #   # grpcRoutes.grpc.parentRefs References to the Gateway resources that the GRPCRoute should attach to
    #   parentRefs:
    #     - name: my-gateway
    #       namespace: gateway-namespace
    #   # grpcRoutes.grpc.hostnames Array with hostnames used for the GRPCRoute
    #   hostnames:
    #     - "my-service.example.com"
    #   # grpcRoutes.grpc.matches Optional array of GRPCRouteMatch objects for matching gRPC requests
    #   matches:
    #     - method:
    #         type: RegularExpression
    #         service: sophora\.srpc.*
    #   # grpcRoutes.grpc.filters Optional array of GRPCRouteFilter objects for modifying requests/responses
    #   filters:
    #     - type: RequestHeaderModifier
    #       requestHeaderModifier:
    #         set:
    #           - name: X-Custom-Header
    #             value: custom-value
    #   # grpcRoutes.grpc.annotations annotations for the GRPCRoute
    #   annotations: {}

  service:
    # clusterServerLb.service.type Kubernetes service type
    type: ClusterIP
    selectorLabels:
      # clusterServerLb.service.selectorLabels.sophora.cloud/app labels used to select the primary Sophora server
      sophora.cloud/app: cluster-server
      # clusterServerLb.service.selectorLabels.server.sophora.cloud/server-mode labels used to select the primary Sophora server
      server.sophora.cloud/server-mode: primary
    # clusterServerLb.service.httpPort the Sophora server's http port
    httpPort: 1196
    # clusterServerLb.service.grpcPort the Sophora server's grpc port
    grpcPort: 2026
    # clusterServerLb.service.jmsPort the Sophora server's jms port
    jmsPort: 1197
    # clusterServerLb.service.publishNotReadyAddresses whether the service should publish not ready addresses
    publishNotReadyAddresses: true

## @section Cluster Server Pod Disruption Budget
## Configuration of the PodDisruptionBudget for the Sophora Cluster Servers (primary and replicas)
##
podDisruptionBudget:
  # podDisruptionBudget.enabled whether the PDB should be installed or not
  enabled: false
  # podDisruptionBudget.name name of the PDB
  name: sophora-cluster-server
  # podDisruptionBudget.minAvailable minimum available replicas
  minAvailable: 2
  # podDisruptionBudget.matchLabels.sophora.cloud/app selector label for the cluster servers
  matchLabels:
    sophora.cloud/app: cluster-server

## @section Alerting / Prometheus Rules
## Configuration of the alerting rules
##
prometheusRules:
  # prometheusRules.enabled Whether the alerts should be installed
  enabled: false
  # prometheusRules.defaultRulesEnabled Whether the default rules should be installed
  defaultRulesEnabled: true
  config:
    NoPrimarySophoraServer:
      for: 1m
    SophoraReplicaServerNotInSync:
      for: 2m
    SophoraStagingServerNotInSync:
      for: 10m
    MultiplePrimarySophoraServers:
      for: 1m
  # prometheusRules.rules allows to add custom rules
  rules: []

## @section Extra Deploy
##
# extraDeploy Allows to specify custom resources that should be deployed
extraDeploy: []

## @section GCP
##
## Specific for the use with GCP Kubernetes Clusters

# gcp.enabled Whether GCP resources should be enabled or not

# gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
# gcp.healthCheck.port Number of the port used for the GCP Health Check
# gcp.healthCheck.portName Name of the port used for the GCP Health Check
# gcp.healthCheck.path HTTP path GCP should use to check the application's health
# gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
# gcp.grpcHealthCheck.enabled Whether the GCP Health Check resource should be deployed for gRPC
# gcp.grpcHealthCheck.logging Whether to enable access logging for GCP Health Check requests for gRPC
gcp:
  enabled: true
  healthCheck:
    enabled: false
    logging: false
    port: 1196
    # note: Cannot use named port when using network endpoint group as backend.
    # portName: http
    path: "/status/ready"
  grpcHealthCheck:
    enabled: false
    logging: false
  # gcp.backendPolicy.enabled Whether the GCP Backend Policy resource should be deployed
  # gcp.backendPolicy.logging.enabled Whether to enable access logging for GCP Backend Policy requests
  # gcp.backendPolicy.logging.sampleRate Sample rate for GCP Backend Policy logging (1-1000000)
  # gcp.backendPolicy.sessionAffinity Type of session affinity for GCP Backend Policy (NONE, GENERATED_COOKIE, HTTP_COOKIE)
  # gcp.backendPolicy.cookieTtlSec TTL for session affinity cookies in seconds (only applicable for GENERATED_COOKIE and HTTP_COOKIE)
  # gcp.backendPolicy.connectionDraining.drainingTimeoutSec Timeout for GCP Backend Policy connection draining in seconds
  # gcp.backendPolicy.timeoutSec Timeout for GCP Backend Policy requests in seconds
  # gcp.backendPolicy.securityPolicy Name of the GCP Cloud Armor Security Policy to apply to the Backend Policy
  # gcp.backendPolicy.iap.enabled Whether to enable Identity-Aware Proxy (IAP) for the GCP Backend Policy
  # gcp.backendPolicy.iap.oauth2ClientSecretName Name of the Kubernetes secret containing the OAuth2 client secret for IAP
  # gcp.backendPolicy.iap.clientID OAuth2 client ID for IAP
  backendPolicy:
    enabled: false
  #  logging:
  #    enabled: false
  #    sampleRate: 1000000
  #  sessionAffinity:
  #    type: NONE
  #    cookieTtlSec: 0
  #  connectionDraining:
  #    drainingTimeoutSec: 0
  #  timeoutSec: 30
  #  securityPolicy: ""
  #  iap:
  #    enabled: false
  #    oauth2ClientSecretName: ""
  #    clientID: ""

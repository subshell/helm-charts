suite: test httproute
templates:
  - httproute.yaml
chart:
  version: 0.9.8
tests:
  - it: should not create httproute by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create multiple httproutes with values
    release:
      name: values-test-release
    values:
      - ./values/httproute.yaml
    asserts:
      - hasDocuments:
          count: 2
      - documentIndex: 0
        containsDocument:
          kind: HTTPRoute
          apiVersion: gateway.networking.k8s.io/v1
          name: values-test-release-sophora-admin-dashboard-primary
      - documentIndex: 1
        containsDocument:
          kind: HTTPRoute
          apiVersion: gateway.networking.k8s.io/v1
          name: values-test-release-sophora-admin-dashboard-secondary
      - documentIndex: 0
        equal:
          path: metadata
          value:
            name: values-test-release-sophora-admin-dashboard-primary
            labels:
              helm.sh/chart: sophora-admin-dashboard-0.9.8
              app.kubernetes.io/name: sophora-admin-dashboard
              app.kubernetes.io/instance: values-test-release
              app.kubernetes.io/managed-by: Helm
            annotations:
              example.com/test: "simple"
              example.com/text: some text value
      - documentIndex: 0
        equal:
          path: spec
          value:
            parentRefs:
              - name: my-gateway
                namespace: gateway-namespace
            hostnames:
              - my-service.example.com
              - other.example.com
            rules:
              - backendRefs:
                  - name: values-test-release-sophora-admin-dashboard
                    port: 80
                filters:
                  - type: RequestHeaderModifier
                    requestHeaderModifier:
                      set:
                        - name: X-Custom-Header
                          value: custom-value
                matches:
                  - path:
                      type: PathPrefix
                      value: /
      - documentIndex: 1
        equal:
          path: metadata
          value:
            name: values-test-release-sophora-admin-dashboard-secondary
            labels:
              helm.sh/chart: sophora-admin-dashboard-0.9.8
              app.kubernetes.io/name: sophora-admin-dashboard
              app.kubernetes.io/instance: values-test-release
              app.kubernetes.io/managed-by: Helm
      - documentIndex: 1
        equal:
          path: spec
          value:
            parentRefs:
              - name: my-gateway
                namespace: gateway-namespace
            hostnames:
              - second.example.com
            rules:
              - backendRefs:
                  - name: values-test-release-sophora-admin-dashboard
                    port: 80
      - notFailedTemplate: {}

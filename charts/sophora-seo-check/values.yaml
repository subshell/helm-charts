nameOverride: ""
fullnameOverride: ""

image:
  repository: container.subshell.com/sophora/seocheck
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "4.0.0"

imagePullSecrets: []

javaOptions: -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem

sophora:
  authentication:
    secret:
      name: ""
      usernameKey: username
      passwordKey: password

  # Represents the application.yaml of Sophora SEO Check
  configuration:
    # Settings for the Sophora server connection.
    sophora:
      client:
        server-connection:
          urls: []
          username: # in secret
          password: # in secret

    # Settings for the SEO Check.
    seo-check:

seoCheck:
  init:
    googleStorageBaseURI: gs://sophora-seo-check

  extraEnv:

storage:
  storageClass: ssd
  dataSize: 200Mi
  persistentDataSize: 100Mi

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  ingressClassName: nginx
  annotations: {}
  hosts:
  tls: []

httpRoute:
  # httpRoute.enabled Whether to create an HTTPRoute resource (Gateway API)
  enabled: false
  # httpRoute.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  # e.g.
  # parentRefs:
  #   - name: my-gateway
  #     namespace: gateway-namespace
  parentRefs: []
  # httpRoute.hostnames Array with hostnames used for the HTTPRoute
  # e.g.
  # hostnames:
  #   - "my-service.example.com"
  hostnames: []
  # matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  # e.g.
  # matches:
  #   - path:
  #       type: PathPrefix
  #       value: /sophora.srpc
  matches: []
  # filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  # e.g.
  # filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #         - name: X-Custom-Header
  #           value: custom-value
  filters: []
  # httpRoute.annotations annotations for the HTTPRoute
  annotations: {}

extraDeploy: []

podAnnotations: {}

pvcAnnotations: {}

## @section GCP Health Check
##
## Specific for the use with GCP Load Balancers

# gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
# gcp.healthCheck.port Number of the port used for the GCP Health Check
# gcp.healthCheck.portName Name of the port used for the GCP Health Check
# gcp.healthCheck.path HTTP path GCP should use to check the application's health
gcp:
  healthCheck:
    enabled: false
    portName: http
    path: "/actuator/health"

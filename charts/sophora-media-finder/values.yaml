replicaCount: 1

image:
  repository: container.subshell.com/sophora/media-finder
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "5.x"

downloadViaS3Image:
  repository: "container.subshell.com/misc/aws-cli-tools"
  tag: "0.0.2"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    memory: 2Gi

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  ingressClassName: nginx
  annotations: {}
  hosts:
  tls: []

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  #   matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

startupProbe:
  path: /actuator/health
  failureThreshold: 15
  initialDelaySeconds: 10
  timeoutSeconds: 5
  periodSeconds: 5

readinessProbe:
  path: /actuator/health
  failureThreshold: 5
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 5

livenessProbe:
  path: /actuator/health
  failureThreshold: 3
  initialDelaySeconds: 15
  timeoutSeconds: 10
  periodSeconds: 60

apiKey:
  secretName: ""
  secretFieldName: api-key

sophora:
  authentication:
    secret:
      name: ""
      usernameKey: username
      passwordKey: password

mediaFinder:
  configuration:
    ard-api:
      assetResearchServiceUrl:
      imageServiceUrl:
      basicAuthToken: ${API_KEY}
      maxInMemorySizeInMB: 10

    spring:
      application:
        spring-additional-base-packages: ""

    cors:
      allowed-origin:

  plugins:
    source: # "s3" or "sidecar". leave blank for none.
    downloadFromS3:
      secretName:
      s3Endpoint: "https://storage.googleapis.com"
      bucketName:
      jarPaths: []
      secretAccessKeyKey: "secretAccessKey"
      accessKeyIdKey: "accessKeyId"
    copyFromSidecarImage:
      repository:
      tag:
      pullPolicy: IfNotPresent
      jarFolder: # the folder containing the jar file(s)

  mediaFinderExecutable:
    JAVA_OPTS="-Xmx1G"

  loaderProperties:
    loader.path=plugins

  logbackSpring: |
    <?xml version="1.0" encoding="UTF-8"?>
    <configuration scan="true" scanPeriod="60 seconds">
      <include resource="org/springframework/boot/logging/logback/defaults.xml"/>

      <!-- Logger -->
      <logger name="com.subshell.sophora" level="INFO"/>
      <logger name="com.subshell.media.finder" level="INFO"/>
      <logger name="org.springframework.boot" level="INFO"/>

      <!-- Default logging configuration -->
      <springProfile name="!json-logs">
        <appender name="console" class="ch.qos.logback.core.ConsoleAppender">
          <encoder>
            <pattern>[%d{ISO8601}, %-5level] [%-35.35thread] [%-36logger{36}:%4line] %msg%n</pattern>
          </encoder>
        </appender>
        <appender name="logfile" class="ch.qos.logback.core.rolling.RollingFileAppender">
          <File>logs/media-finder.log</File>
          <rollingPolicy class="ch.qos.logback.core.rolling.TimeBasedRollingPolicy">
            <fileNamePattern>logs/media-finder.%d{yyyy-MM-dd}.log.gz</fileNamePattern>
            <maxHistory>90</maxHistory>
          </rollingPolicy>
          <encoder>
            <charset>UTF-8</charset>
            <pattern>[%d{ISO8601}, %-5p] [%-35t] [%-40logger{40}:%-3L] %m%n</pattern>
          </encoder>
        </appender>

        <root level="WARN">
          <appender-ref ref="console"/>
          <appender-ref ref="logfile"/>
        </root>
      </springProfile>

      <!-- JSON logging configuration -->
      <springProfile name="json-logs">
        <appender name="jsonConsole" class="ch.qos.logback.core.ConsoleAppender">
          <encoder class="net.logstash.logback.encoder.LogstashEncoder" />
        </appender>
        <appender name="jsonLogfile" class="ch.qos.logback.core.rolling.RollingFileAppender">
          <File>logs/media-finder.log</File>
          <rollingPolicy class="ch.qos.logback.core.rolling.TimeBasedRollingPolicy">
            <fileNamePattern>logs/media-finder.%d{yyyy-MM-dd}.log.gz</fileNamePattern>
            <maxHistory>90</maxHistory>
          </rollingPolicy>
          <encoder class="net.logstash.logback.encoder.LogstashEncoder" />
        </appender>
        <root level="WARN">
          <appender-ref ref="jsonConsole"/>
          <appender-ref ref="jsonLogfile"/>
        </root>
      </springProfile>

    </configuration>

## @section GCP
##
## Specific for the use with GCP Kubernetes Clusters

gcp:
  # gcp.enabled Wether GCP resources should be enabled or not
  enabled: true
  # gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
  # gcp.healthCheck.port Number of the port used for the GCP Health Check
  # gcp.healthCheck.portName Name of the port used for the GCP Health Check
  # gcp.healthCheck.path HTTP path GCP should use to check the application's health
  # gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
  healthCheck:
    enabled: false
    logging: false
    port: 8080
    path: "/actuator/health"
  # gcp.backendPolicy.enabled Whether the GCP Backend Policy resource should be deployed
  # gcp.backendPolicy.logging Whether to enable access logging for GCP Backend Policy requests
  # gcp.backendPolicy.sampleRate Sample rate for GCP Backend Policy logging (1-1000000)
  # gcp.backendPolicy.sessionAffinity Type of session affinity for GCP Backend Policy (NONE, GENERATED_COOKIE, HTTP_COOKIE)
  # gcp.backendPolicy.cookieTtlSec TTL for session affinity cookies in seconds (only applicable for GENERATED_COOKIE and HTTP_COOKIE)
  # gcp.backendPolicy.timeoutSec Timeout for GCP Backend Policy requests in seconds
  # gcp.backendPolicy.securityPolicy Name of the GCP Cloud Armor Security Policy to apply to the Backend Policy
  # gcp.backendPolicy.iap.enabled Whether to enable Identity-Aware Proxy (IAP) for the GCP Backend Policy
  # gcp.backendPolicy.iap.oauth2ClientSecretName Name of the Kubernetes secret containing the OAuth2 client secret for IAP
  # gcp.backendPolicy.iap.clientId OAuth2 client ID for IAP
  backendPolicy:
    enabled: false
  #  logging:
  #    enabled: false
  #    sampleRate: 1000000
  #  sessionAffinity:
  #    type: NONE
  #    cookieTtlSec: 0
  #  timeoutSec: 30
  #  securityPolicy: ""
  #  iap:
  #    enabled: false
  #    oauth2ClientSecretName: ""
  #    clientId: ""

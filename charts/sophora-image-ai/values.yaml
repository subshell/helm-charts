nameOverride: ""
fullnameOverride: ""

image:
  repository: docker.subshell.com/sophora/imageai
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "5.1.0"

imagePullSecrets: []

javaOptions: -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem

sophora:
  authentication:
    secret:
      name: ""
      usernameKey: username
      passwordKey: password

  # Represents the application.yaml of Sophora Image AI
  configuration:
    # Settings for the Sophora server connection.
    sophora:
      client:
        server-connection:
          urls: []
          username: # in secret
          password: # in secret

    spring:
      cloud:
        gcp:
          # GCP project ID
          project-id: my-project

imageAI:
  # Extra environment variables.
  #
  # Example extra environment variable to use a GCP credentials file from a secret.
  # Use this in combination with extraVolumes and extraVolumeMounts.
  #
  # - name: GOOGLE_APPLICATION_CREDENTIALS
  #   value: /gcp-credentials/credentials.json
  extraEnv:

resources:
  requests:
    cpu: 10m
    memory: 1Gi
  limits:
    memory: 2Gi

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  ingressClassName: nginx
  annotations: {}
  hosts:
  tls: []

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  #   matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

extraDeploy: []

# Extra volumes.
#
# Example extra volume to use a GCP credentials file from a secret:
#
# - name: gcp-credentials
#   secret:
#     secretName: sophora-image-ai-gcp-credentials
extraVolumes: []

# Extra volume mounts.
#
# Example extra volume mount to use a GCP credentials file from a secret:
#
# - name: gcp-credentials
#   mountPath: /gcp-credentials
#   readOnly: true
extraVolumeMounts: []

podAnnotations: {}

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

image:
  repository: container.subshell.com/sophora/sophora-importer
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "master"

downloadViaS3Image:
  repository: "container.subshell.com/misc/aws-cli-tools"
  tag: "0.0.2"
  pullPolicy: IfNotPresent

nodeSelector: {}
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# extraDeploy Extra objects to deploy (value evaluated as a template)
extraDeploy: []

javaOptions: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=80.0 -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem"

# - (object) k8s Pod host aliases which will be used to generate the /etc/hosts file
hostAliases:

serviceMonitor:
  enabled: false
  interval: 10s

sophora:
  authentication:
    secret:
      name: ""
      passwordKey: "password"
      usernameKey: "username"
  importer:
    s3Bucket:
      name:
      url:
      region:
      secret:
        name: ""
        secretAccessKeyKey: "secretAccessKey"
        accessKeyIdKey: "accessKeyId"
    extraEnv:
    loaderPath:
    configuration: {}

logbackXml: |
  <?xml version="1.0" encoding="UTF-8"?>
  <configuration scan="true" scanPeriod="60 seconds">
      <jmxConfigurator/>

      <appender name="jsonConsoleAppender" class="ch.qos.logback.core.ConsoleAppender">
          <encoder class="net.logstash.logback.encoder.LogstashEncoder" />
      </appender>

      <logger name="com.subshell.sophora" level="INFO"/>
      <logger name="com.subshell.sophora.importer" level="INFO"/>
      <logger name="org.springframework.boot" level="INFO"/>

      <root level="WARN">
          <appender-ref ref="jsonConsoleAppender"/>
      </root>
  </configuration>

transformation:
  enabled: false
  xslTransformerFactory:
  data:
    zipViaS3:
      secretName:
      s3Endpoint: "https://storage.googleapis.com"
      bucketName:
      zipPaths:
      secretAccessKeyKey: "secretAccessKey"
      accessKeyIdKey: "accessKeyId"
    useSaxon: false
    saxonLicenceSecretName: "saxon-license"
    saxonLicenceSecretKey: "saxon-license.lic"
    libsPath: libs
    xslPath: xsl

podAnnotations: {}

podLabels: {}

resources:
  requests:
    cpu: 200m
    memory: 2Gi
  limits:
    memory: 2Gi

startupProbe:
  failureThreshold: 10
  initialDelaySeconds: 10
  timeoutSeconds: 3
  periodSeconds: 2

readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 1
  timeoutSeconds: 3
  periodSeconds: 5

livenessProbe:
  failureThreshold: 1
  initialDelaySeconds: 1
  timeoutSeconds: 3
  periodSeconds: 60

service:
  annotations: {}
  clusterIP: ""
  type: ClusterIP
  httpPort: 80

ingress:
  enabled: false
  # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
  # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
  # ingressClassName: nginx
  annotations: {}
  hosts:
  tls: []

extraIngress: []
  #- ingressClassName: nginx
  #  annotations:
  #    foo: baz
  #  hosts:
  #  tls: []

# There is the option of setting up the importer container with additionalVolumes and additionalVolumeMounts.
# In this case the volumeMount and the volume must be used together and be configured in the same way (e.g. have the same name).
additionalVolumes:

additionalVolumeMounts:

# This option can be used to create a pvc for the local import folders
importPvcSpec:

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  #   matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

## @section GCP
##
## Specific for the use with GCP Kubernetes Clusters

gcp:
  # gcp.enabled Whether GCP resources should be enabled or not
  enabled: true
  # gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
  # gcp.healthCheck.port Number of the port used for the GCP Health Check
  # gcp.healthCheck.portName Name of the port used for the GCP Health Check
  # gcp.healthCheck.path HTTP path GCP should use to check the application's health
  # gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
  healthCheck:
    enabled: false
    logging: false
    port: 8082
    # note: Cannot use named port when using network endpoint group as backend.
    # portName: main
    path: "/actuator/health/readiness"
  # gcp.backendPolicy.enabled Whether the GCP Backend Policy resource should be deployed
  # gcp.backendPolicy.logging.enabled Whether to enable access logging for GCP Backend Policy requests
  # gcp.backendPolicy.logging.sampleRate Sample rate for GCP Backend Policy logging (1-1000000)
  # gcp.backendPolicy.sessionAffinity Type of session affinity for GCP Backend Policy (NONE, GENERATED_COOKIE, HTTP_COOKIE)
  # gcp.backendPolicy.cookieTtlSec TTL for session affinity cookies in seconds (only applicable for GENERATED_COOKIE and HTTP_COOKIE)
  # gcp.backendPolicy.connectionDraining.drainingTimeoutSec Timeout for GCP Backend Policy connection draining in seconds
  # gcp.backendPolicy.timeoutSec Timeout for GCP Backend Policy requests in seconds
  # gcp.backendPolicy.securityPolicy Name of the GCP Cloud Armor Security Policy to apply to the Backend Policy
  # gcp.backendPolicy.iap.enabled Whether to enable Identity-Aware Proxy (IAP) for the GCP Backend Policy
  # gcp.backendPolicy.iap.oauth2ClientSecretName Name of the Kubernetes secret containing the OAuth2 client secret for IAP
  # gcp.backendPolicy.iap.clientID OAuth2 client ID for IAP
  backendPolicy:
    enabled: false
  #  logging:
  #    enabled: false
  #    sampleRate: 1000000
  #  sessionAffinity:
  #    type: NONE
  #    cookieTtlSec: 0
  #  connectionDraining:
  #    drainingTimeoutSec: 0
  #  timeoutSec: 30
  #  securityPolicy: ""
  #  iap:
  #    enabled: false
  #    oauth2ClientSecretName: ""
  #    clientID: ""

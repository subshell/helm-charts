nameOverride: ""
fullnameOverride: ""

image:
  repository: container.subshell.com/sophora/linkchecker
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "6.0.0"

imagePullSecrets: []

javaOptions: -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem

sophora:
  authentication:
    secret:
      name: ""
      usernameKey: username
      passwordKey: password

  # Represents the application.yaml of Sophora Link Checker.
  configuration:
    # Settings for the Sophora server connection.
    sophora:
      client:
        server-connection:
          urls: []
          username: # in secret
          password: # in secret

    link-checker:

startupProbe:
  failureThreshold: 15
  initialDelaySeconds: 5
  timeoutSeconds: 30
  periodSeconds: 1

readinessProbe:
  failureThreshold: 5
  initialDelaySeconds: 5
  timeoutSeconds: 5
  periodSeconds: 5

livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 15
  timeoutSeconds: 10
  periodSeconds: 60

resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    memory: 1Gi

linkChecker:
  extraEnv:

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  ingressClassName: nginx
  annotations: {}
  hosts:
  tls: []

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  #   matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

extraDeploy: []

podAnnotations: {}

## @section GCP
##
## Specific for the use with GCP Kubernetes Clusters

gcp:
  # gcp.enabled Whether GCP resources should be enabled or not
  enabled: true
  # gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
  # gcp.healthCheck.port Number of the port used for the GCP Health Check
  # gcp.healthCheck.portName Name of the port used for the GCP Health Check
  # gcp.healthCheck.path HTTP path GCP should use to check the application's health
  # gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
  healthCheck:
    enabled: false
    logging: false
    port: 8080
    path: "/actuator/health/readiness"
  # gcp.backendPolicy.enabled Whether the GCP Backend Policy resource should be deployed
  # gcp.backendPolicy.logging Whether to enable access logging for GCP Backend Policy requests
  # gcp.backendPolicy.logging.sampleRate Sample rate for GCP Backend Policy logging (1-1000000)
  # gcp.backendPolicy.sessionAffinity Type of session affinity for GCP Backend Policy (NONE, GENERATED_COOKIE, HTTP_COOKIE)
  # gcp.backendPolicy.cookieTtlSec TTL for session affinity cookies in seconds (only applicable for GENERATED_COOKIE and HTTP_COOKIE)
  # gcp.backendPolicy.timeoutSec Timeout for GCP Backend Policy requests in seconds
  # gcp.backendPolicy.securityPolicy Name of the GCP Cloud Armor Security Policy to apply to the Backend Policy
  # gcp.backendPolicy.iap.enabled Whether to enable Identity-Aware Proxy (IAP) for the GCP Backend Policy
  # gcp.backendPolicy.iap.oauth2ClientSecretName Name of the Kubernetes secret containing the OAuth2 client secret for IAP
  # gcp.backendPolicy.iap.clientID OAuth2 client ID for IAP
  backendPolicy:
    enabled: false
  #  logging:
  #    enabled: false
  #    sampleRate: 1000000
  #  sessionAffinity:
  #    type: NONE
  #    cookieTtlSec: 0
  #  timeoutSec: 30
  #  securityPolicy: ""
  #  iap:
  #    enabled: false
  #    oauth2ClientSecretName: ""
  #    clientID: ""

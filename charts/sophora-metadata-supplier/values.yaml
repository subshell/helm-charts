image:
  repository: container.subshell.com/sophora/metadata-supplier
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

downloadViaS3Image:
  repository: "container.subshell.com/misc/aws-cli-tools"
  tag: "0.0.2"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# extraDeploy Extra objects to deploy (value evaluated as a template)
##
extraDeploy: []

# - (object) k8s Pod host aliases which will be used to generate the /etc/hosts file
hostAliases:

javaOptions: "-XX:InitialRAMPercentage=50.0 -XX:MaxRAMPercentage=80.0 -XX:+ExitOnOutOfMemoryError -XX:+PerfDisableSharedMem"

metadataSupplier:
  configuration:
    # This is the application.yaml
  messages:
    # This is the custom messages.properties
  mapping:
    source: # "s3" or "sidecar". leave blank for none.
    downloadFromS3:
      secretName:
      s3Endpoint: "https://storage.googleapis.com"
      bucketName:
      jarPaths: []
      secretAccessKeyKey: "secretAccessKey"
      accessKeyIdKey: "accessKeyId"
    copyFromSidecarImage:
      repository:
      tag:
      pullPolicy: IfNotPresent
      jarFolder: # the folder containing the jar file(s)
  env:

sophora:
  authentication:
    secret:
      name: ""
      passwordKey: "password"
      usernameKey: "username"

ardmedialibrary:
  authentication:
    secret:
      name: ""
      passwordKey: "password"
      usernameKey: "username"

serviceMonitor:
  enabled: false
  interval: 10s
  path: /actuator/prometheus

startupProbe:
  httpPath: '/actuator/health/readiness'
  failureThreshold: 40
  initialDelaySeconds: 10
  timeoutSeconds: 1
  periodSeconds: 2

readinessProbe:
  httpPath: '/actuator/health/readiness'
  failureThreshold: 5
  initialDelaySeconds: 5
  timeoutSeconds: 1
  periodSeconds: 5

livenessProbe:
  httpPath: '/actuator/health/liveness'
  failureThreshold: 5
  initialDelaySeconds: 5
  timeoutSeconds: 1
  periodSeconds: 10

podAnnotations: {}

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
  # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
  # ingressClassName: nginx
  annotations: {}
  hosts:
  tls: []

# httpRoutes Map of HTTPRoute resources (Gateway API) to create.
# The map key is used as a suffix for the resource name, e.g. "web" -> "<fullname>-web".
httpRoutes: {}
  # web:
  #   # httpRoutes.web.parentRefs References to the Gateway resources that the HTTPRoute should attach to
  #   parentRefs:
  #     - name: my-gateway
  #       namespace: gateway-namespace
  #   # httpRoutes.web.hostnames Array with hostnames used for the HTTPRoute
  #   hostnames:
  #     - "my-service.example.com"
  #   # httpRoutes.web.matches Optional array of HTTPRouteMatch objects for matching HTTP requests
  #   matches:
  #     - path:
  #         type: PathPrefix
  #         value: /
  #   # httpRoutes.web.filters Optional array of HTTPRouteFilter objects for modifying requests/responses
  #   filters:
  #     - type: RequestHeaderModifier
  #       requestHeaderModifier:
  #         set:
  #           - name: X-Custom-Header
  #             value: custom-value
  #   # httpRoutes.web.annotations annotations for the HTTPRoute
  #   annotations: {}

prometheusRule:
  enabled: false
  defaultRules:
    enabled: true
    jobQueue:
      maxQueueSize: 1000
      maxQueueTime: 10m
      maxQueueSeverity: high
  rules: []

resources:
  requests:
    cpu: 200m
    memory: 3Gi
  limits:
    memory: 3Gi

storage:
  storageClass: ssd
  size: 10Gi
  # dataSource:
  #  apiGroup: snapshot.storage.k8s.io
  #  kind: VolumeSnapshot
  #  name: sophora-metadata-supplier


serviceAccount:
  create: false

nodeSelector: {}

tolerations: []

affinity: {}

## @section GCP Health Check
##
## Specific for the use with GCP Load Balancers

# gcp.healthCheck.enabled Whether the GCP Health Check resource should be deployed
# gcp.healthCheck.port Number of the port used for the GCP Health Check
# gcp.healthCheck.portName Name of the port used for the GCP Health Check
# gcp.healthCheck.path HTTP path GCP should use to check the application's health
# gcp.healthCheck.logging Whether to enable access logging for GCP Health Check requests
gcp:
  healthCheck:
    enabled: false
    logging: false
    port: 8080
    # note: Cannot use named port when using network endpoint group as backend.
    # portName: http
    path: "/actuator/health/readiness"
